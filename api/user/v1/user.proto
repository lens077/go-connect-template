syntax = "proto3";

import "third_party/validate/validate.proto";

package user.v1;

option go_package = "github.com/lens077/go-connect-template/api/user/v1;userv1";

service UserService {
  rpc SignIn(SignInRequest) returns(SignInResponse){}
}

message SignInRequest {
  string code = 1 [
    (buf.validate.field).required = true
  ];
  string state = 2 [
    (buf.validate.field).required = true
  ];
}

message SignInResponse {
  string state = 1;
  string data = 2;
}
