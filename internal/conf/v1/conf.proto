syntax = "proto3";

package conf.v1;

import "third_party/validate/validate.proto";

option go_package = "github.com/lens077/go-connect-template/internal/conf/v1;confv1";

message Bootstrap {
  Server server = 1[
    (buf.validate.field).required = true
  ];
  Data data = 2[
    (buf.validate.field).required = true
  ];
  Auth auth = 3[
    (buf.validate.field).required = true
  ];
  Observability observability = 4[
    (buf.validate.field).required = false
  ];
  Discovery discovery = 5[
    (buf.validate.field).required = false
  ];
  Search search = 6[
    (buf.validate.field).required = false
  ];
  Log log = 7[
    (buf.validate.field).required = true
  ];
}

message Log {
  string level = 1;
  string format = 2;
  ESLog es_log = 3;
  message ESLog {
    bool enable_request_log = 1;
    bool enable_response_log = 2;
  }
}

message Server {
  string addr = 1;
  int64 timeout = 2;
  Cors cors = 3;
  message Cors {
    repeated string allowed_origins = 1;
  }
}

message Data {
  message Database {
    Postgres postgres = 1;
    message Postgres {
      string host = 1;
      int32 port = 2;
      string user = 3;
      string password = 4;
      string db_name = 5;
      string ssl_mode = 6;
      string timezone = 7;
      DatabasePool pool = 8;
      Tls tls = 9;

      message DatabasePool {
        int32 max_conns = 1;
        int32 min_conns = 2;
        int64 max_conn_lifetime = 3;
        int64 max_conn_idle_time = 4;
      }
      message Tls {
        bool enable = 1;
        string ssl_mode = 2;
        string ca_pem = 3;
      }
    }
  }

  message Cache {
    Redis redis = 1;
    message Redis {
      string host = 1;
      int32 port = 2;
      string username = 3;
      string password = 4;
      int32 db = 5;
      int64 dial_timeout = 6;
      int64 read_timeout = 7;
      int64 write_timeout = 8;
      int32 pool_size = 9;
      int32 min_idle_conns = 10;
      Tls tls = 11;

      message Tls {
        bool enable = 1;
        string ca_pem = 2;
        bool insecure_skip_verify = 3;
      }
    }
  }

  Database database = 1;
  Cache cache = 2;
}

message Auth {
  Casdoor casdoor = 1;
  message Casdoor {
    string endpoint = 1;
    string client_id = 2;
    string client_secret = 3;
    string organization_name = 4;
    string application_name = 5;
    string certificate = 6;
  }
}

message Observability {
  Trace trace = 1;
  Metric metric = 2;
  Logging log = 3;
  bool enable = 4;

  message Trace {
    string endpoint = 1;
    Tls tls = 2;
  }
  message Metric {
    string endpoint = 1;
    Tls tls = 2;
  }
  message Logging {
    string endpoint = 1;
    Tls tls = 2;
  }
  message Tls {
    bool enable = 1;
    string ca_pem = 2;
    bool insecure_skip_verify = 3;
  }
}

message Discovery {
  message Consul {
    string addr = 1;
    string scheme = 2;
    bool health_check = 3;
    Tls tls = 4;
    Ttl ttl = 5;

    message Tls {
      bool enable = 1;
      bool insecure_skip_verify = 2;
      string ca_pem = 3;
    }
    message Ttl {
      string duration = 1;
      uint64 ping_interval_seconds = 2;
    }
  }
  Consul consul = 1;
}

message Search {
  message ElasticSearch {
    repeated string addresses = 1;
    string username = 2;
    string password = 3;
    Tls tls = 4;
    message Tls {
      bool enable = 1;
      bool insecure_skip_verify = 2;
      string ca_pem = 3;
    }
  }
  ElasticSearch elastic_search = 1;
}
